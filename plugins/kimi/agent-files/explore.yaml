version: 1
agent:
  name: kimi-explore
  extend: default
  system_prompt_path: ./explore-system.md
  # NOTE (v0.4.0, kimi-code port): kimi-code has no --agent-file, so this file
  # is no longer passed to the CLI. Its PATH is still the broker's policy
  # selector: any non-coder agent file routes the run through the fail-closed
  # read-only KIMI_CODE_HOME built by scripts/lib/kimi-home.mjs (deny rule
  # `!{Read,Grep,Glob,ReadMediaFile}` — the kimi-code equivalent of this
  # allow-list). The legacy kimi-cli semantics below are kept for reference:
  # allow-list (fail-CLOSED), read tools only, no write/shell/agent/web egress.
  tools:
    - "kimi_cli.tools.file:ReadFile"
    - "kimi_cli.tools.file:ReadMediaFile"
    - "kimi_cli.tools.file:Glob"
    - "kimi_cli.tools.file:Grep"
