version: 1
agent:
  name: kimi-explore
  extend: default
  system_prompt_path: ./explore-system.md
  # Allow-list (fail-CLOSED), not exclude_tools (fail-open). Used by the
  # read-only commands /kimi:explore, /kimi:review, /kimi:challenge, which run
  # under `--yolo` in the user's repo — the ONLY thing keeping them read-only
  # is this tool set. A deny-list would silently grant any NEW tool Kimi adds
  # in a future version (e.g. a new patch/move/delete or MCP write tool), so we
  # grant ONLY read tools here. No WriteFile/StrReplaceFile/Shell/Agent, and no
  # web egress (a read-only codebase review shouldn't phone out).
  tools:
    - "kimi_cli.tools.file:ReadFile"
    - "kimi_cli.tools.file:ReadMediaFile"
    - "kimi_cli.tools.file:Glob"
    - "kimi_cli.tools.file:Grep"
